version: 2

project_name: logr

# ── Before hooks ──────────────────────────────────────────────────────────────

before:
  hooks:
    - go mod download
    - go mod tidy

# ── Builds ────────────────────────────────────────────────────────────────────

builds:
  - id: logr
    main: ./cmd/logr
    binary: logr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuildDate={{.Date}}

# ── Archives ──────────────────────────────────────────────────────────────────

archives:
  - id: logr
    ids:
      - logr
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# ── Checksum ──────────────────────────────────────────────────────────────────

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# ── Changelog ─────────────────────────────────────────────────────────────────
# Note: conventional-commits requires GoReleaser Pro.
# Using free-tier compatible changelog with regexp groups instead.

changelog:
  sort: asc
  abbrev: -1
  groups:
    - title: "✨ New Features"
      regexp: "^feat"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "⚡ Performance"
      regexp: "^perf"
      order: 2
    - title: "📝 Documentation"
      regexp: "^docs"
      order: 3
    - title: "🔄 Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"

# ── Release ───────────────────────────────────────────────────────────────────

release:
  github:
    owner: Mihir99-mk
    name: logr
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    ```bash
    # Homebrew
    brew install Mihir99-mk/tap/logr

    # Go install
    go install github.com/OpenCortex-Labs/logr@latest

    # curl (Linux / macOS)
    curl -sf https://raw.githubusercontent.com/OpenCortex-Labs/logr/main/install.sh | sh
    ```

    **Full Changelog**: https://github.com/OpenCortex-Labs/logr/blob/main/CHANGELOG.md

# ── Homebrew ──────────────────────────────────────────────────────────────────

homebrew_casks:
  - name: logr
    repository:
      owner: Mihir99-mk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/OpenCortex-Labs/logr"
    description: "Terminal-native log intelligence for developers."
    license: "MIT"