run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none

  enable:
    # Correctness
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Style
    - misspell
    - godot

    # Safety
    - gosec
    - noctx
    - bodyclose

    # Concurrency (important for logr — goroutines everywhere)
    - contextcheck
    - wrapcheck

    # Maintainability
    - dupl
    - gocritic
    - revive
    - prealloc
    - exhaustive

  settings:
    govet:
      enable-all: true
      disable:
        - shadow

    gosec:
      excludes:
        - G304

    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
          disabled: false

    dupl:
      threshold: 150

    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - hugeParam

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  exclude-rules:
    - path: "_test.go"
      linters:
        - dupl
        - gosec
        - wrapcheck
    - path: "cmd/"
      linters:
        - revive